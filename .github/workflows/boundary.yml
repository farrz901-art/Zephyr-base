name: boundary

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  boundary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Source lineage exists
        run: Test-Path docs/SOURCE_LINEAGE.md

      - name: Bridge runtime modes doc exists
        run: Test-Path docs/BRIDGE_RUNTIME_MODES.md

      - name: Tauri command bridge doc exists
        run: Test-Path docs/TAURI_COMMAND_BRIDGE.md

      - name: UI artifact consumption doc exists
        run: Test-Path docs/UI_ARTIFACT_CONSUMPTION.md

      - name: UI invoke integration doc exists
        run: Test-Path docs/UI_TAURI_INVOKE_INTEGRATION.md

      - name: Base local app flow doc exists
        run: Test-Path docs/BASE_LOCAL_APP_FLOW.md

      - name: Tauri window interaction proof doc exists
        run: Test-Path docs/TAURI_WINDOW_INTERACTION_PROOF.md

      - name: Manual Tauri proof doc exists
        run: Test-Path docs/MANUAL_TAURI_WINDOW_PROOF.md

      - name: Packaged runtime policy doc exists
        run: Test-Path docs/PACKAGED_RUNTIME_BASELINE.md

      - name: Offline runtime wheelhouse proof doc exists
        run: Test-Path docs/OFFLINE_RUNTIME_WHEELHOUSE_PROOF.md

      - name: Tauri generated artifacts doc exists
        run: Test-Path docs/TAURI_GENERATED_ARTIFACTS.md

      - name: Install layout policy doc exists
        run: Test-Path docs/BASE_INSTALL_LAYOUT_POLICY.md

      - name: Clean machine runtime proof plan exists
        run: Test-Path docs/CLEAN_MACHINE_RUNTIME_PROOF_PLAN.md

      - name: Clean machine runtime proof doc exists
        run: Test-Path docs/CLEAN_MACHINE_RUNTIME_PROOF.md

      - name: Manual clean machine proof doc exists
        run: Test-Path docs/MANUAL_CLEAN_MACHINE_RUNTIME_PROOF.md

      - name: Wheelhouse policy doc exists
        run: Test-Path runtime/python-runtime/WHEELHOUSE_POLICY.md

      - name: Windows installer packaging policy exists
        run: Test-Path docs/WINDOWS_INSTALLER_PACKAGING_POLICY.md

      - name: Base UX policy doc exists
        run: Test-Path docs/BASE_USER_EXPERIENCE_POLICY.md

      - name: Base bilingual brief exists
        run: Test-Path docs/BASE_BILINGUAL_UI_BRIEF.md

      - name: Manual Base UX smoke doc exists
        run: Test-Path docs/MANUAL_BASE_UX_SMOKE.md

      - name: Base external UX smoke policy exists
        run: Test-Path docs/BASE_EXTERNAL_UX_SMOKE_POLICY.md

      - name: Manual external package UX proof doc exists
        run: Test-Path docs/MANUAL_EXTERNAL_PACKAGE_UX_PROOF.md

      - name: Windows packaging readme exists
        run: Test-Path packaging/windows/README.md

      - name: No BOM check
        run: python scripts/check_no_bom.py --json

      - name: Boundary check
        run: python scripts/check_boundary.py --json

      - name: Generated artifact hygiene check
        run: python scripts/check_generated_artifact_hygiene.py --json

      - name: Runtime packaging baseline check
        run: python scripts/check_runtime_packaging_baseline.py --json

      - name: Install layout baseline check
        run: python scripts/check_install_layout_baseline.py --json

      - name: Clean-machine proof pack baseline
        run: python scripts/check_clean_machine_proof_pack_baseline.py --json

      - name: Offline runtime baseline check
        run: python scripts/check_offline_runtime_baseline.py --json

      - name: Windows installer baseline check
        run: python scripts/check_windows_installer_baseline.py --json

      - name: Bundle surface audit
        run: python scripts/audit_public_core_bundle_surface.py --json

      - name: Fixture flow smoke
        run: python scripts/check_local_fixture_flow.py --json

      - name: Unsupported surface negative smoke
        run: python scripts/check_bundle_unsupported_surface.py --json

      - name: Tauri command bridge check
        run: python scripts/check_tauri_command_bridge.py --json

      - name: UI shell check
        run: python scripts/check_ui_shell.py --json

      - name: Base UX shell check
        run: python scripts/check_base_ux_shell.py --json

      - name: External package UX baseline check
        run: python scripts/check_external_package_ux_baseline.py --json

      - name: UI result lifecycle check
        run: python scripts/check_ui_result_lifecycle.py --json

      - name: Local result lifecycle UX check
        run: python scripts/check_local_result_lifecycle_ux.py --json

      - name: UI install
        run: npm --prefix ui ci

      - name: UI build check
        run: python scripts/check_ui_build.py --json

      - name: UI typecheck
        run: npm --prefix ui run typecheck

      - name: Build Tauri app baseline
        continue-on-error: true
        run: python scripts/build_tauri_app_baseline.py --json

      - name: Build install layout
        run: python scripts/build_base_install_layout.py --json

      - name: Audit install layout
        run: python scripts/audit_base_install_layout.py --json

      - name: Build clean-machine proof pack
        run: python scripts/build_clean_machine_proof_pack.py --json

      - name: Clean-machine relocation audit
        run: python scripts/audit_clean_machine_pack_relocation.py --json

      - name: Build offline wheelhouse
        continue-on-error: true
        run: python scripts/build_base_runtime_wheelhouse.py --json

      - name: Offline network guard
        run: python scripts/check_offline_install_network_guard.py --json

      - name: Offline proof pack build
        continue-on-error: true
        run: python scripts/build_clean_machine_offline_proof_pack.py --json

      - name: Wheel-only readiness
        continue-on-error: true
        run: python scripts/check_wheelhouse_wheel_only_readiness.py --json

      - name: Python runtime dependency preflight
        continue-on-error: true
        run: python scripts/check_python_runtime_dependencies.py --prefer-managed --json

      - name: Managed runtime bootstrap
        continue-on-error: true
        run: python scripts/bootstrap_base_runtime.py --json

      - name: Managed runtime flow
        continue-on-error: true
        run: python scripts/check_managed_runtime_flow.py --json

      - name: Tauri app path check
        continue-on-error: true
        run: python scripts/check_tauri_app_path.py --json

      - name: Install layout runtime smoke
        continue-on-error: true
        run: python scripts/check_base_install_layout_runtime_smoke.py --json

      - name: Clean-machine local simulation
        continue-on-error: true
        run: python scripts/check_clean_machine_pack_local_simulation.py --json

      - name: Offline wheelhouse install
        continue-on-error: true
        run: python scripts/check_wheelhouse_runtime_install.py --json

      - name: Offline proof local simulation
        continue-on-error: true
        run: python scripts/check_offline_proof_pack_local_simulation.py --json

      - name: Build unsigned Windows installer package
        continue-on-error: true
        run: python scripts/build_windows_installer_package.py --json

      - name: Audit unsigned Windows installer package
        continue-on-error: true
        run: python scripts/audit_windows_installer_package.py --json

      - name: Run unsigned Windows install smoke
        continue-on-error: true
        run: python scripts/run_windows_install_smoke.py --package .tmp/windows_installer_package/ZephyrBase-windows-unsigned.zip --json

      - name: Build external package UX proof pack
        continue-on-error: true
        run: python scripts/build_external_package_ux_proof_pack.py --json

      - name: Run external package runtime smoke
        continue-on-error: true
        run: python scripts/run_external_package_runtime_smoke.py --package .tmp/windows_installer_package/ZephyrBase-windows-unsigned.zip --json

      - name: Check external GUI runtime bootstrap
        continue-on-error: true
        run: python scripts/check_external_gui_runtime_bootstrap.py --json

      - name: Tauri window launch attempt
        continue-on-error: true
        run: python scripts/attempt_tauri_window_launch.py --json

      - name: Tauri window interaction proof status
        continue-on-error: true
        run: python scripts/check_tauri_window_interaction_proof.py --json
